spring.application.name=gocartacho
server.port=8081
spring.thymeleaf.cache=false

jwt.secret=${JWT_SECRET:gocartacho_secret_key_1234567890_para_desarrollo_local}

# =============================================
# SESIONES
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# IMPORTANTE: Cambiar a true SOLO en producción con HTTPS. En desarrollo local HTTP debe ser false.
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.max-age=1800

# =============================================
# MongoDB
# =============================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/gocartacho_db}
spring.data.mongodb.auto-index-creation=true

# =============================================
# MySQL (Para Arquitectura Híbrida)
# =============================================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/gocartacho_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info

# Configuración de Caché (Local con Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=10m,maximumSize=500

# =============================================
# OPTIMIZACIONES: RED E INSERCIONES BATCH
# =============================================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# =============================================
# LÓGICA RUTA INTELIGENTE / MAPA DE CALOR
# =============================================
gocartacho.heatmap.business-radius-km=0.1
gocartacho.heatmap.threshold.low=2
gocartacho.heatmap.threshold.medium=8

# =============================================
# OAUTH2 GOOGLE CONFIGURATION
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:773857557560-ulr1evi3cu8u9uno4rr5ffd4kv14mol7.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:gocspx-dummy-secret-key-replace-in-prod}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}

# =============================================
# EMAIL (JavaMailSender)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_contraseña_de_aplicacion}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
